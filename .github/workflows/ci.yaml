# CI for Product Catalog Service
name: product-catalog-ci

on: 
  push:
    branches:
      - main
    paths:
      - 'src/product-catalog/**' # Super Critical: Pipeline sirf tabhi chalegi jab is folder mein real code change hoga (Loop Protection!)

permissions:
  contents: write # Super Critical: GITHUB_TOKEN ko write permission dega taaki runner manifest repository mein wapas push kar sake

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Setup Go 1.22
      uses: actions/setup-go@v4 # Updated to v4 for Node16 deprecation warning fix
      with:
        go-version: '1.22'
        
    - name: Build
      run: |
        cd src/product-catalog
        go mod download
        go build -o product-catalog-service main.go

    - name: unit tests
      run: |
        cd src/product-catalog
        go test ./...
    
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v4
        
    - name: Setup Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'
        
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.55.2
        working-directory: src/product-catalog

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Install Docker
      uses: docker/setup-buildx-action@v3 # Updated to v3
        
    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker Push
      uses: docker/build-push-action@v6
      with:
        context: src/product-catalog
        file: src/product-catalog/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}
    
  updatek8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update exact tag in kubernetes deployment manifest
      run: | 
        # Safe sed: Sirf product-catalog ke image tag ko touch karega, baki sidecars safe rahenge
        sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:.*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}|" kubernetes/productcatalog/deploy.yaml
        
    - name: Commit and push changes safely
      run: |
        git config --global user.email "khumendrasinha78@gmail.com"
        git config --global user.name "Khumendra Sinha"
        git add kubernetes/productcatalog/deploy.yaml
        # [skip ci] dalne se GitHub automatic commits par dubara pipeline trigger nahi karta
        git commit -m "[CI]: Update product catalog image tag to ${{ github.run_id }} [skip ci]"
        git push origin main